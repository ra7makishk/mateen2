<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>جدول المقابلات والقبول - برنامج متين</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --primary: #1a3a5c;
    --primary-light: #2557a7;
    --accent: #d4a853;
    --accent-light: #f0c97a;
    --bg: #f4f6fa;
    --surface: #ffffff;
    --surface2: #eef1f7;
    --border: #dde2ed;
    --text: #1a2236;
    --text-muted: #6b7a99;
    --danger: #c93d3d;
    --danger-bg: #fdf0f0;
    --success: #1e7c52;
    --success-bg: #edfaf4;
    --shadow: 0 2px 12px rgba(26,58,92,0.08);
    --radius: 10px;
    --radius-lg: 16px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Cairo', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    direction: rtl;
  }

  header {
    background: var(--primary);
    padding: 0;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 16px rgba(26,58,92,0.25);
  }

  .header-inner {
    max-width: 1300px;
    margin: 0 auto;
    padding: 0 2rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 68px;
  }

  .logo { display: flex; align-items: center; gap: 12px; }
  .logo-icon { width: 40px; height: 40px; background: var(--accent); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 20px; }
  .logo-text h1 { font-size: 17px; font-weight: 700; color: #fff; }
  .logo-text span { font-size: 12px; color: rgba(255,255,255,0.6); }

  .header-actions { display: flex; gap: 10px; }
  .btn {
    display: inline-flex; align-items: center; gap: 7px;
    padding: 8px 18px; border-radius: var(--radius);
    font-family: 'Cairo', sans-serif; font-size: 13px; font-weight: 600;
    cursor: pointer; border: none;
  }
  .btn-primary { background: var(--accent); color: var(--primary); }
  .btn-primary:hover { background: var(--accent-light); }
  .btn-outline { background: transparent; color: #fff; border: 1.5px solid rgba(255,255,255,0.3); }
  .btn-outline:hover { background: rgba(255,255,255,0.1); }
  .btn-danger { background: var(--danger-bg); color: var(--danger); border: 1px solid #f5c6c6; }
  .btn-danger:hover { background: #f9dddd; }
  .btn-success { background: var(--success-bg); color: var(--success); border: 1px solid #a7e3c8; }
  .btn-success:hover { background: #d4f5e7; }

  .stats-bar { background: var(--primary-light); padding: 12px 2rem; }
  .stats-inner { max-width: 1300px; margin: 0 auto; display: flex; gap: 1.5rem; flex-wrap: wrap; }
  .stat { display: flex; align-items: center; gap: 8px; color: rgba(255,255,255,0.85); font-size: 13px; }
  .stat strong { color: var(--accent-light); font-size: 18px; }

  main { max-width: 1300px; margin: 0 auto; padding: 2rem; }
  .controls { display: flex; justify-content: space-between; margin-bottom: 1.5rem; flex-wrap: wrap; gap: 12px; }
  .search-box { position: relative; flex: 1; max-width: 320px; }
  .search-box input { width: 100%; padding: 9px 14px 9px 38px; border: 1.5px solid var(--border); border-radius: var(--radius); font-family: 'Cairo', sans-serif; }
  .filter-group { display: flex; gap: 8px; flex-wrap: wrap; }
  .filter-group select { padding: 8px 14px; border: 1.5px solid var(--border); border-radius: var(--radius); font-family: 'Cairo', sans-serif; background: white; cursor: pointer; }

  .table-card { background: var(--surface); border-radius: var(--radius-lg); box-shadow: var(--shadow); overflow: hidden; border: 1px solid var(--border); }
  .table-wrapper { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; min-width: 900px; }
  thead { background: var(--primary); }
  thead th { color: white; padding: 13px 12px; text-align: center; font-size: 12px; }
  tbody tr { border-bottom: 1px solid var(--border); transition: background 0.12s; }
  tbody tr:hover { background: #f8f9fd; }
  tbody td { padding: 8px 12px; text-align: center; font-size: 13.5px; }

  .name-cell { display: flex; gap: 6px; align-items: center; }
  .name-cell input { flex: 1; padding: 6px 8px; border: 1.5px solid transparent; border-radius: 6px; font-family: 'Cairo', sans-serif; font-size: 13.5px; background: transparent; }
  .name-cell input:focus { outline: none; border-color: var(--primary-light); background: white; }
  .save-name-btn { background: none; border: none; cursor: pointer; color: var(--success); font-size: 16px; padding: 4px 8px; border-radius: 6px; }
  .save-name-btn:hover { background: var(--success-bg); }

  .day-select, .time-input { width: 100%; padding: 6px 8px; border: 1.5px solid transparent; border-radius: 6px; font-family: 'Cairo', sans-serif; text-align: center; background: transparent; cursor: pointer; }
  .day-select:hover, .time-input:hover { background: var(--surface2); }
  .day-select:focus, .time-input:focus { outline: none; border-color: var(--primary-light); background: white; }

  .toggle-btn { padding: 5px 12px; border-radius: 20px; border: none; cursor: pointer; font-family: 'Cairo', sans-serif; font-size: 12px; font-weight: 600; transition: all 0.18s; }
  .toggle-btn.pending { background: var(--surface2); color: var(--text-muted); border: 1.5px solid var(--border); }
  .toggle-btn.done { background: var(--success-bg); color: var(--success); border: 1.5px solid #a7e3c8; }
  .toggle-btn.accepted { background: #e8f4ff; color: var(--primary-light); border: 1.5px solid #b3d4f5; }
  .toggle-btn.rejected { background: var(--danger-bg); color: var(--danger); border: 1.5px solid #f5c6c6; }
  .toggle-btn.na { background: #f5f5f5; color: #b0bac9; border: 1.5px solid #e0e0e0; }

  .del-btn { background: none; border: none; cursor: pointer; color: #b0bac9; padding: 5px; border-radius: 8px; transition: all 0.15s; }
  .del-btn:hover { background: var(--danger-bg); color: var(--danger); }

  .add-row-btn { width: 100%; padding: 10px; margin-top: 10px; background: none; border: 1.5px dashed var(--border); border-radius: var(--radius); cursor: pointer; font-family: 'Cairo', sans-serif; font-size: 13px; color: var(--text-muted); }
  .add-row-btn:hover { border-color: var(--primary-light); color: var(--primary-light); background: #f0f5ff; }

  .bulk-add-panel { background: var(--surface2); border-radius: var(--radius); padding: 15px; margin-bottom: 20px; display: flex; gap: 10px; align-items: flex-start; flex-wrap: wrap; }
  .bulk-add-panel textarea { flex: 1; padding: 10px; border: 1.5px solid var(--border); border-radius: var(--radius); font-family: 'Cairo', sans-serif; font-size: 13px; min-height: 80px; resize: vertical; }
  .bulk-add-panel textarea:focus { outline: none; border-color: var(--primary-light); }

  .table-footer { background: var(--surface2); padding: 12px 20px; display: flex; justify-content: space-between; border-top: 1px solid var(--border); font-size: 12.5px; color: var(--text-muted); flex-wrap: wrap; }

  .toast { position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%) translateY(20px); background: var(--primary); color: white; padding: 11px 22px; border-radius: var(--radius); font-size: 13px; opacity: 0; transition: 0.3s; pointer-events: none; z-index: 300; }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  @media print { header, .stats-bar, .controls, .table-footer, .add-row-btn, .bulk-add-panel, .del-btn { display: none !important; } }
  @media (max-width: 640px) { main { padding: 1rem; } .header-inner { padding: 0 1rem; } .controls { flex-direction: column; } .search-box { max-width: 100%; } }
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="logo">
      <div class="logo-icon">📖</div>
      <div class="logo-text"><h1>برنامج متين 2</h1><span>حفظ تلقائي للأسماء</span></div>
    </div>
    <div class="header-actions">
      <button class="btn btn-outline" onclick="window.print()">🖨️ طباعة</button>
      <button class="btn btn-outline" onclick="exportCSV()">⬇️ تصدير</button>
      <button class="btn btn-primary" onclick="addRow()">+ إضافة طالبة</button>
    </div>
  </div>
</header>

<div class="stats-bar">
  <div class="stats-inner">
    <div class="stat"><strong id="stat-total">0</strong><span>إجمالي الطالبات</span></div>
    <div class="stat"><strong id="stat-interviewed">0</strong><span>أُجريت مقابلتها</span></div>
    <div class="stat"><strong id="stat-not-interviewed">0</strong><span>لم تُجرَ</span></div>
    <div class="stat"><strong id="stat-accepted">0</strong><span>مقبولة</span></div>
    <div class="stat"><strong id="stat-rejected">0</strong><span>غير مقبولة</span></div>
  </div>
</div>

<main>
  <div class="bulk-add-panel">
    <textarea id="bulk-names" placeholder="📝 أدخلي الأسماء هنا، كل اسم في سطر منفصل&#10;مثال:&#10;أسماء محمد أحمد&#10;نور علي حسن&#10;فاطمة محمود"></textarea>
    <button class="btn btn-success" onclick="addBulkNames()">➕ إضافة الكل</button>
  </div>

  <div class="controls">
    <div class="search-box">
      <input type="text" id="search-input" placeholder="🔍 ابحثي عن طالبة..." oninput="filterTable()">
    </div>
    <div class="filter-group">
      <select id="day-filter" onchange="filterTable()">
        <option value="">📅 كل الأيام</option>
        <option>الأحد</option><option>الاثنين</option><option>الثلاثاء</option>
        <option>الأربعاء</option><option>الخميس</option><option>الجمعة</option><option>السبت</option>
      </select>
      <select id="interview-filter" onchange="filterTable()">
        <option value="">🎙️ كل المقابلات</option>
        <option value="done">✅ تمت</option>
        <option value="pending">⏳ لم تتم</option>
      </select>
      <select id="accepted-filter" onchange="filterTable()">
        <option value="">📊 كل النتائج</option>
        <option value="accepted">🎉 مقبولة</option>
        <option value="rejected">❌ غير مقبولة</option>
        <option value="na">⏸️ لم يحدد</option>
      </select>
      <button class="btn btn-danger" onclick="clearAllData()">🗑️ مسح الكل</button>
    </div>
  </div>

  <div class="table-card">
    <div class="table-wrapper">
      <table>
        <thead>
          <tr><th>#</th><th>اسم الطالبة</th><th>اليوم</th><th>الساعة</th><th>المقابلة</th><th>القبول</th><th></th></tr>
        </thead>
        <tbody id="tbody"></tbody>
       </table>
    </div>
    <button class="add-row-btn" onclick="addRow()">+ إضافة طالبة جديدة</button>
    <div class="table-footer">
      <span id="footer-info">جاري التحميل...</span>
      <span>💾 يتم الحفظ تلقائياً في المتصفح</span>
    </div>
  </div>
</main>

<div class="toast" id="toast"></div>

<script>
  const STORAGE_KEY = 'mateen_students_data';
  const DAYS = ['الأحد', 'الاثنين', 'الثلاثاء', 'الأربعاء', 'الخميس', 'الجمعة', 'السبت'];
  
  const DEFAULT_NAMES = [
    'سمية بنت باسم', 'سفانة بنت ماهر', 'رحمة أحمد توفيق', 'سهام بنت سرحان المطرفي',
    'فاطمة بنت محمد توفيق', 'أمينة أحمد يوسف', 'أميرة بشير سلطان', 'عبير بشير سلطان',
    'زينب راجي لغالي', 'هبة سليك', 'حصة بنت لافي الثبيتي', 'روضة موسى صالح',
    'عائشة أحمد أمان', 'آسيا بنت صباح بن علي', 'شروق علي الشهري', 'عفاف محمد أحمد',
    'ناهد عبدالعزيز عبدالفتاح', 'هاجر نجار حامد', 'حياة عبدالواسع جابر', 
    'فاطمة احمد المالكي', 'حنان الشهراني', 'شيماء نيازي'
  ];

  let students = [];

  function loadData() {
    const saved = localStorage.getItem(STORAGE_KEY);
    if (saved) {
      students = JSON.parse(saved);
    } else {
      students = DEFAULT_NAMES.map(name => ({
        id: Date.now() + Math.random() + name,
        name: name,
        day: '',
        time: '',
        interview: 'pending',
        accepted: 'na'
      }));
      saveData();
    }
    renderTable();
    updateStats();
  }

  function saveData() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(students));
  }

  function updateStats() {
    const valid = students.filter(s => s.name && s.name.trim());
    document.getElementById('stat-total').textContent = valid.length;
    document.getElementById('stat-interviewed').textContent = students.filter(s => s.interview === 'done').length;
    document.getElementById('stat-not-interviewed').textContent = students.filter(s => s.interview === 'pending').length;
    document.getElementById('stat-accepted').textContent = students.filter(s => s.accepted === 'accepted').length;
    document.getElementById('stat-rejected').textContent = students.filter(s => s.accepted === 'rejected').length;
  }

  function updateStudent(id, field, value) {
    const student = students.find(s => s.id == id);
    if (student) {
      student[field] = value;
      if (field === 'interview' && value === 'pending') {
        student.accepted = 'na';
      }
      saveData();
      filterTable();
      showToast(field === 'name' ? '💾 تم حفظ الاسم' : field === 'day' ? '📅 تم تحديث اليوم' : '⏰ تم تحديث الوقت');
    }
  }

  function deleteStudent(id) {
    students = students.filter(s => s.id != id);
    saveData();
    filterTable();
    showToast('🗑️ تم حذف الطالبة');
  }

  function addRow() {
    const newStudent = {
      id: Date.now() + Math.random(),
      name: '',
      day: '',
      time: '',
      interview: 'pending',
      accepted: 'na'
    };
    students.push(newStudent);
    saveData();
    filterTable();
    setTimeout(() => {
      const inputs = document.querySelectorAll('tbody tr:last-child .name-cell input');
      if (inputs.length) inputs[0].focus();
    }, 80);
    showToast('✅ تمت إضافة سطر جديد');
  }

  function addBulkNames() {
    const textarea = document.getElementById('bulk-names');
    const text = textarea.value;
    if (!text.trim()) {
      showToast('⚠️ الرجاء إدخال الأسماء أولاً');
      return;
    }
    const names = text.split('\n').filter(n => n.trim().length > 0);
    let added = 0;
    for (const name of names) {
      students.push({
        id: Date.now() + Math.random() + name,
        name: name.trim(),
        day: '',
        time: '',
        interview: 'pending',
        accepted: 'na'
      });
      added++;
    }
    saveData();
    filterTable();
    textarea.value = '';
    showToast(`✅ تمت إضافة ${added} اسم جديد`);
  }

  function clearAllData() {
    if (confirm('⚠️ هل أنت متأكدة من مسح جميع البيانات؟ لا يمكن التراجع.')) {
      students = [];
      saveData();
      renderTable();
      updateStats();
      showToast('🗑️ تم مسح جميع البيانات');
    }
  }

  function renderTable(filteredList) {
    const tbody = document.getElementById('tbody');
    const data = filteredList || students;
    tbody.innerHTML = '';
    
    data.forEach((student, idx) => {
      const ivClass = student.interview === 'done' ? 'done' : 'pending';
      const ivText = student.interview === 'done' ? '✅ تمت' : '⏳ لم تُجرَ';
      
      let acClass = 'na', acText = '— لم يُحدَّد';
      if (student.accepted === 'accepted') { acClass = 'accepted'; acText = '✔️ مقبولة'; }
      else if (student.accepted === 'rejected') { acClass = 'rejected'; acText = '✖️ غير مقبولة'; }
      
      const acDisabled = student.interview !== 'done' ? 'disabled style="opacity:0.5"' : '';
      
      const tr = document.createElement('tr');
      tr.innerHTML = `
        <td>${idx + 1}</td>
        <td class="name-td">
          <div class="name-cell">
            <input type="text" value="${escapeHtml(student.name)}" placeholder="اكتبي اسم الطالبة..." id="name-${student.id}" onkeypress="if(event.key==='Enter'){updateStudent('${student.id}','name',this.value)}">
            <button class="save-name-btn" onclick="updateStudent('${student.id}','name',document.getElementById('name-${student.id}').value)">💾</button>
          </div>
        </td>
        <td>
          <select class="day-select" onchange="updateStudent('${student.id}','day',this.value)">
            <option value="">-- اليوم --</option>
            ${DAYS.map(d => `<option value="${d}" ${student.day === d ? 'selected' : ''}>${d}</option>`).join('')}
          </select>
        </td>
        <td>
          <input type="text" class="time-input" value="${escapeHtml(student.time)}" placeholder="10:00 ص" onchange="updateStudent('${student.id}','time',this.value)">
        </td>
        <td>
          <button class="toggle-btn ${ivClass}" onclick="updateStudent('${student.id}','interview', student.interview === 'pending' ? 'done' : 'pending')">
            ${ivText}
          </button>
        </td>
        <td>
          <button class="toggle-btn ${acClass}" onclick="if(student.interview==='done'){ const order=['na','accepted','rejected']; const cur=order.indexOf(student.accepted); updateStudent('${student.id}','accepted',order[(cur+1)%3]); }" ${acDisabled}>
            ${acText}
          </button>
        </td>
        <td>
          <button class="del-btn" onclick="deleteStudent('${student.id}')" title="حذف">🗑️</button>
        </td>
      `;
      tbody.appendChild(tr);
    });
    
    document.getElementById('footer-info').textContent = filteredList ? `تعرض ${data.length} من ${students.length} سجل` : `إجمالي السجلات: ${students.length}`;
  }

  function filterTable() {
    const search = document.getElementById('search-input').value.trim().toLowerCase();
    const dayFilter = document.getElementById('day-filter').value;
    const interviewFilter = document.getElementById('interview-filter').value;
    const acceptedFilter = document.getElementById('accepted-filter').value;
    
    const filtered = students.filter(s => {
      const matchSearch = !search || (s.name || '').toLowerCase().includes(search);
      const matchDay = !dayFilter || s.day === dayFilter;
      const matchInterview = !interviewFilter || s.interview === interviewFilter;
      const matchAccepted = !acceptedFilter || s.accepted === acceptedFilter;
      return matchSearch && matchDay && matchInterview && matchAccepted;
    });
    renderTable(filtered);
  }

  function exportCSV() {
    const headers = ['الرقم', 'اسم الطالبة', 'اليوم', 'الساعة', 'تمت المقابلة', 'القبول'];
    const rows = [headers.join(',')];
    students.forEach((s, i) => {
      const ivLabel = s.interview === 'done' ? 'تمت' : 'لم تُجرَ';
      const acLabel = s.accepted === 'accepted' ? 'مقبولة' : s.accepted === 'rejected' ? 'غير مقبولة' : 'لم يُحدَّد';
      rows.push([i+1, `"${s.name || ''}"`, s.day || '', s.time || '', ivLabel, acLabel].join(','));
    });
    const blob = new Blob(['\uFEFF' + rows.join('\n')], {type: 'text/csv;charset=utf-8'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = 'جدول_متين.csv'; a.click();
    URL.revokeObjectURL(url);
    showToast('⬇️ تم تصدير الجدول');
  }

  function escapeHtml(str) { return (str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
  
  let toastTimer;
  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => t.classList.remove('show'), 2000);
  }

  window.updateStudent = updateStudent;
  window.deleteStudent = deleteStudent;
  window.addRow = addRow;
  window.addBulkNames = addBulkNames;
  window.clearAllData = clearAllData;
  window.filterTable = filterTable;
  window.exportCSV = exportCSV;

  loadData();
</script>
</body>
</html>
